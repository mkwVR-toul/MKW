<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MK World Stats</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e53935">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:sans-serif;}
header{
 background:#e53935;color:#fff;padding:15px;text-align:center;
 position:relative;
}
.reset-btn{
 position:absolute;right:8px;top:8px;
 background:#fff;color:#e53935;border:none;
 padding:3px 8px;font-size:12px;border-radius:6px;
}

.nav{display:flex;}
.nav button{flex:1;border-radius:0;}

.page{display:none;padding:15px;background:#f5f5f5;}
.page.active{display:block;}

.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:12px;}
button{width:100%;padding:8px;border:none;border-radius:10px;background:#e53935;color:#fff;margin-top:5px;}
input,textarea{width:100%;padding:10px;margin-top:5px;}

.suggest-box{background:#fff;border:1px solid #ccc;max-height:150px;overflow:auto;}
.suggest-item{padding:8px;border-bottom:1px solid #eee;}

.course-img,.memo-img{width:100%;border-radius:10px;margin-top:5px;}
.delete-btn{background:#555;margin-top:5px;}

.memo-title{font-weight:bold;cursor:pointer;}
.memo-content{display:none;margin-top:10px;}

.stats-row{display:flex;justify-content:space-around;margin-bottom:10px;font-weight:bold;}
</style>
</head>

<body>

<header>
MK World Stats
<button class="reset-btn" onclick="resetStats()">戦績リセット</button>
</header>

<div class="nav">
<button onclick="showPage(0)">メイン</button>
<button onclick="showPage(1)">コース</button>
<button onclick="showPage(2)">メモ</button>
</div>

<!-- メイン -->
<div class="page active">

<div class="card">
<input id="courseSearch" placeholder="コース検索" oninput="showSuggestions()">
<div id="suggestions" class="suggest-box"></div>

<input id="newCourse" placeholder="コース追加">
<button onclick="addCourse()">追加</button>
</div>

<div class="card">
順位<input id="rank" type="number" min="1" max="24">
VR<input id="vrInput" type="number" min="0" max="99999">
<button onclick="addRecord()">記録</button>
</div>

<div class="card">
<h3>直近5試合</h3>
<div id="recent"></div>
</div>

<div class="card">
<div class="stats-row" id="topStats"></div>
<h3>VR推移</h3>
<div id="chartContainer"></div>
</div>

</div>

<!-- コース -->
<div class="page">
<div class="card">
<button onclick="cycleSort()" id="sortBtn">並び替え: 勝率 高い順</button>
<div id="courseStats"></div>
</div>
</div>

<!-- メモ -->
<div class="page">
<div class="card">

<input id="memoSearch" placeholder="タイトル検索" oninput="render()">

<input id="memoTitle" placeholder="タイトル">
<textarea id="memoText"></textarea>
<input type="file" id="memoImage">
<button onclick="addMemo()">追加</button>

<div id="memoList"></div>

</div>
</div>

<script>
// ===== ページ =====
function showPage(i){
 document.querySelectorAll(".page").forEach((p,idx)=>{
  p.classList.toggle("active",idx===i);
 });
}

// ===== 戦績リセット =====
function resetStats(){
 if(!confirm("戦績だけ削除しますか？")) return;
 data=[];
 save();
 render();
}

// ===== ひらがな→カタカナ =====
function toKatakana(str){
 return str.replace(/[\u3041-\u3096]/g, m =>
  String.fromCharCode(m.charCodeAt(0)+0x60)
 );
}

// ===== ServiceWorker =====
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('service-worker.js');
}

// ===== DB =====
let db;
const req=indexedDB.open("MKDB",1);

req.onupgradeneeded=e=>{
 db=e.target.result;
 db.createObjectStore("images");
};

req.onsuccess=e=>{
 db=e.target.result;
 render();
};

function saveImage(key,file){
 return new Promise(res=>{
  const tx=db.transaction("images","readwrite");
  tx.objectStore("images").put(file,key);
  tx.oncomplete=res;
 });
}

function getImage(key){
 return new Promise(res=>{
  const tx=db.transaction("images","readonly");
  const r=tx.objectStore("images").get(key);
  r.onsuccess=()=>res(r.result?URL.createObjectURL(r.result):null);
 });
}

function deleteImage(key){
 const tx=db.transaction("images","readwrite");
 tx.objectStore("images").delete(key);
}

// ===== データ =====
let data=JSON.parse(localStorage.getItem("data")||"[]");
let courses=JSON.parse(localStorage.getItem("courses")||'["マリオサーキット"]');
let memos=JSON.parse(localStorage.getItem("memos")||"[]");

let selectedCourse="";
let sortMode=0;

function save(){
 localStorage.setItem("data",JSON.stringify(data));
 localStorage.setItem("courses",JSON.stringify(courses));
 localStorage.setItem("memos",JSON.stringify(memos));
}

// ===== コース =====
function addCourse(){
 const c=newCourse.value.trim();
 if(!c)return;
 if(!courses.includes(c)){
  courses.push(c);
  courses.sort((a,b)=>a.localeCompare(b,'ja'));
 }
 newCourse.value="";
 save(); render();
}

function deleteCourse(c){
 if(!confirm("削除?"))return;
 courses=courses.filter(x=>x!==c);
 deleteImage("course_"+c);
 save(); render();
}

// ===== 記録 =====
function addRecord(){
 if(vrInput.value===""||rank.value==="") return alert("入力必須");
 if(!selectedCourse) return alert("コース選択");

 const vr=Number(vrInput.value);
 const r=Number(rank.value);

 if(vr<0||vr>99999) return alert("VRは5桁以内");
 if(r<1||r>24) return alert("順位は1〜24");

 const prev=data.length?data[data.length-1].vr:vr;

 data.push({course:selectedCourse,rank:r,vr,diff:vr-prev});

 vrInput.value="";
 rank.value="";
 courseSearch.value="";
 selectedCourse="";

 save(); render();
}

function deleteRecord(i){
 if(!confirm("削除?"))return;
 data.splice(i,1);

 for(let x=0;x<data.length;x++){
  let prev=x>0?data[x-1].vr:data[x].vr;
  data[x].diff=data[x].vr-prev;
 }

 save(); render();
}

// ===== 検索 =====
function showSuggestions(){
 let box=document.getElementById("suggestions");
 let key=toKatakana(courseSearch.value.toLowerCase());
 box.innerHTML="";
 courses.filter(c=>toKatakana(c.toLowerCase()).startsWith(key))
 .forEach(c=>{
  let d=document.createElement("div");
  d.className="suggest-item";
  d.textContent=c;
  d.onclick=()=>{selectedCourse=c;courseSearch.value=c;box.innerHTML="";};
  box.appendChild(d);
 });
}

// ===== 並び替え =====
function cycleSort(){
 sortMode=(sortMode+1)%4;
 updateSortText();
 render();
}

function updateSortText(){
 const text=[
  "並び替え: 勝率 高い順",
  "並び替え: 勝率 低い順",
  "並び替え: 平均レート変動 大きい順",
  "並び替え: 平均レート変動 小さい順"
 ];
 sortBtn.textContent=text[sortMode];
}

// ===== メモ =====
function addMemo(){
 const t=memoTitle.value;
 const txt=memoText.value;
 const f=memoImage.files[0];
 if(!t)return alert("タイトル必須");

 if(f){
  const key="memo_"+Date.now();
  saveImage(key,f).then(()=>{
   memos.push({title:t,text:txt,imgKey:key});
   save(); render();
  });
 }else{
  memos.push({title:t,text:txt});
  save(); render();
 }

 memoTitle.value="";
 memoText.value="";
 memoImage.value="";
}

function editMemo(i){
 const t=prompt("タイトル",memos[i].title);
 if(t===null)return;
 const txt=prompt("本文",memos[i].text||"");
 if(txt===null)return;
 memos[i].title=t;
 memos[i].text=txt;
 save(); render();
}

function deleteMemo(i){
 if(!confirm("削除?"))return;
 memos.splice(i,1);
 save(); render();
}

function toggleMemo(i){
 const el=document.getElementById("memo"+i);
 el.style.display=el.style.display==="none"?"block":"none";
}

// ===== 描画 =====
async function render(){

 // ★ 直近5試合（削除ボタン復活）
 recent.innerHTML="";
 data.slice(-5).reverse().forEach((r,idx)=>{
  const real=data.length-1-idx;
  const color=r.diff>0?"red":"blue";

  recent.innerHTML+=`
  <div>
   <span style="color:${color}">
    ${r.course} ${r.rank}位 [VR:${r.vr}] (${r.diff>=0?'+':''}${r.diff})
   </span>
   <button class="delete-btn" onclick="deleteRecord(${real})">削除</button>
  </div>`;
 });

 // 統計
 let maxVR=data.length?Math.max(...data.map(d=>d.vr)):0;
 let last30=data.slice(-30);
 let win=last30.filter(d=>d.diff>0).length;
 let wr=last30.length?(win/last30.length*100):0;
 let avgRank=data.length?(data.reduce((a,b)=>a+b.rank,0)/data.length):0;

 topStats.innerHTML=`
  <div>最高VR:${maxVR}</div>
  <div style="color:${wr>50?"red":"blue"}">勝率:${wr.toFixed(1)}%</div>
  <div>平均順位:${avgRank.toFixed(2)}位</div>
 `;

 // グラフ
 chartContainer.innerHTML='<canvas id="chart"></canvas>';
 const ctx=document.getElementById("chart");
 const v=last30.map(d=>d.vr);

 if(v.length){
  let min=Math.min(...v);
  let max=Math.max(...v);
  if(min===max){min-=10;max+=10;}

  new Chart(ctx,{
   type:'line',
   data:{labels:v.map((_,i)=>i+1),datasets:[{data:v}]},
   options:{scales:{y:{min:min-5,max:max+5}}}
  });
 }

 // コース
 let map={};
 data.forEach(d=>{
  if(!map[d.course]) map[d.course]={c:0,t:0,w:0,df:0};
  map[d.course].c++;
  map[d.course].t+=d.rank;
  map[d.course].df+=d.diff;
  if(d.diff>0) map[d.course].w++;
 });

 let list=courses.map(c=>{
  let s=map[c]||{c:0,t:0,w:0,df:0};
  let wr=s.c?(s.w/s.c*100):0;
  let avgDiff=s.c?(s.df/s.c):0;
  return {course:c,...s,wr,avgDiff};
 });

 list.sort((a,b)=>{
  switch(sortMode){
   case 0: return b.wr-a.wr;
   case 1: return a.wr-b.wr;
   case 2: return b.avgDiff-a.avgDiff;
   case 3: return a.avgDiff-b.avgDiff;
  }
 });

 let html="";
 for(let i of list){
  const img=await getImage("course_"+i.course);

  html+=`
  <div>
  <b>${i.course}</b><br>
  回数:${i.c}<br>
  平均:${i.c?(i.t/i.c).toFixed(2)+"位":"-"}<br>
  平均レート変動:<span style="color:${i.avgDiff>0?"red":"blue"}">
   ${i.c?(i.avgDiff>=0?"+":"")+i.avgDiff.toFixed(1):"-"}
  </span><br>
  勝率:<span style="color:${i.wr>=50?"red":"blue"}">
   ${i.c?i.wr.toFixed(1)+"%":"-"}
  </span><br>

  <input type="file" onchange="uploadImage(event,'${i.course}')">
  ${img?`<img src="${img}" class="course-img">`:""}

  <button class="delete-btn" onclick="deleteCourse('${i.course}')">削除</button>
  </div><hr>`;
 }
 courseStats.innerHTML=html;

 updateSortText();

 // メモ検索
 let mhtml="";
 const search=toKatakana(memoSearch.value.toLowerCase());

 for(let i=0;i<memos.length;i++){
  let m=memos[i];
  if(search && !toKatakana(m.title.toLowerCase()).includes(search)) continue;

  const img=m.imgKey?await getImage(m.imgKey):null;

  mhtml+=`
  <div class="card">
   <div class="memo-title" onclick="toggleMemo(${i})">${m.title}</div>
   <div id="memo${i}" class="memo-content">
    ${m.text||""}
    ${img?`<img src="${img}" class="memo-img">`:""}
    <button onclick="editMemo(${i})">編集</button>
    <button class="delete-btn" onclick="deleteMemo(${i})">削除</button>
   </div>
  </div>`;
 }
 memoList.innerHTML=mhtml;
}

function uploadImage(e,c){
 const f=e.target.files[0];
 if(!f)return;
 saveImage("course_"+c,f).then(render);
}
</script>

</body>
</html>
