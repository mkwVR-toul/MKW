<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MK World Stats</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:sans-serif;}
header{background:#e53935;color:#fff;padding:15px;text-align:center;position:relative;}
.reset-btn{position:absolute;right:8px;top:8px;background:#fff;color:#e53935;border:none;padding:3px 8px;font-size:12px;border-radius:6px;}

.nav{display:flex;}
.nav button{flex:1;border:none;padding:10px;background:#eee;}
.nav button.active{background:#e53935;color:#fff;}

.page{display:none;padding:15px;background:#f5f5f5;}
.page.active{display:block;}

.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:12px;}
button{width:100%;padding:8px;border:none;border-radius:10px;background:#e53935;color:#fff;margin-top:5px;}
input,textarea{width:100%;padding:10px;margin-top:5px;}

.suggest-box{background:#fff;border:1px solid #ccc;max-height:150px;overflow:auto;}
.suggest-item{padding:8px;border-bottom:1px solid #eee;}

.delete-btn{background:#555;margin-top:5px;}
.memo-img,.course-img{width:100%;border-radius:10px;margin-top:5px;cursor:pointer;}

.memo-title{font-weight:bold;cursor:pointer;}
.memo-content{display:none;margin-top:10px;}

.stats-row{display:flex;justify-content:space-around;margin-bottom:10px;font-weight:bold;}

#imgModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;}
#imgModal img{max-width:90%;max-height:90%;}
</style>
</head>

<body>

<header>
MK World Stats
<button class="reset-btn" onclick="resetStats()">戦績リセット</button>
</header>

<div class="nav">
<button onclick="showPage(0,this)" class="active">メイン</button>
<button onclick="showPage(1,this)">コース</button>
<button onclick="showPage(2,this)">メモ</button>
</div>

<!-- メイン -->
<div class="page active">

<div class="card">
<input id="courseSearch" placeholder="コース検索" oninput="showSuggestions()">
<div id="suggestions" class="suggest-box"></div>

<input id="newCourse" placeholder="コース追加">
<button onclick="addCourse()">追加</button>
</div>

<div class="card">
順位<input id="rank" type="number" min="1" max="24">
VR<input id="vrInput" type="number" min="0" max="99999">
<button onclick="addRecord()">記録</button>
</div>

<div class="card">
<h3>直近5試合</h3>
<div id="recent"></div>
</div>

<div class="card">
<div class="stats-row" id="topStats"></div>
<h3>VR推移</h3>
<canvas id="chart"></canvas>
</div>

</div>

<!-- コース -->
<div class="page">
<div class="card">
<button onclick="cycleSort()" id="sortBtn">並び替え: 勝率 高い順</button>
<div id="courseStats"></div>
</div>
</div>

<!-- メモ -->
<div class="page">
<div class="card">

<input id="memoSearch" placeholder="タイトル検索" oninput="render()">

<input id="memoTitle" placeholder="タイトル">
<textarea id="memoText"></textarea>
<input type="file" id="memoImage">
<button onclick="addMemo()">追加</button>

<div id="memoList"></div>

</div>
</div>

<div id="imgModal" onclick="this.style.display='none'">
<img id="modalImg">
</div>

<script>

// ===== ページ切替 =====
function showPage(i,btn){
 document.querySelectorAll(".page").forEach((p,idx)=>p.classList.toggle("active",idx===i));
 document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

// ===== データ =====
let data=JSON.parse(localStorage.getItem("data")||"[]");
let courses=JSON.parse(localStorage.getItem("courses")||'["マリオサーキット"]');
let memos=JSON.parse(localStorage.getItem("memos")||"[]");
let courseImages=JSON.parse(localStorage.getItem("courseImages")||"{}");

let selectedCourse="";
let sortMode=0;
let chart;

// ===== 保存 =====
function save(){
 localStorage.setItem("data",JSON.stringify(data));
 localStorage.setItem("courses",JSON.stringify(courses));
 localStorage.setItem("memos",JSON.stringify(memos));
 localStorage.setItem("courseImages",JSON.stringify(courseImages));
}

// ===== リセット =====
function resetStats(){
 if(!confirm("戦績削除?"))return;
 data=[]; save(); render();
}

// ===== コース =====
function addCourse(){
 const c=newCourse.value.trim();
 if(!c)return;
 if(!courses.includes(c)) courses.push(c);
 newCourse.value="";
 save();render();
}

function deleteCourse(c){
 if(!confirm("削除?"))return;
 courses=courses.filter(x=>x!==c);
 delete courseImages[c];
 save();render();
}

// ===== 記録 =====
function addRecord(){
 if(!selectedCourse) return alert("コース選択");

 const vr=Number(vrInput.value);
 const r=Number(rank.value);

 if(vr<0||vr>99999) return alert("VR5桁以内");
 if(r<1||r>24) return alert("順位1〜24");

 const prev=data.length?data[data.length-1].vr:vr;
 data.push({course:selectedCourse,rank:r,vr,diff:vr-prev});

 vrInput.value="";rank.value="";courseSearch.value="";selectedCourse="";
 save();render();
}

function deleteRecord(i){
 if(!confirm("削除?"))return;
 data.splice(i,1);

 for(let x=0;x<data.length;x++){
  let prev=x>0?data[x-1].vr:data[x].vr;
  data[x].diff=data[x].vr-prev;
 }

 save();render();
}

// ===== 検索 =====
function toKatakana(str){
 return str.replace(/[\u3041-\u3096]/g,m=>String.fromCharCode(m.charCodeAt(0)+0x60));
}

function showSuggestions(){
 let box=suggestions;
 let key=toKatakana(courseSearch.value.toLowerCase());
 box.innerHTML="";
 courses.filter(c=>toKatakana(c.toLowerCase()).startsWith(key))
 .forEach(c=>{
  let d=document.createElement("div");
  d.className="suggest-item";
  d.textContent=c;
  d.onclick=()=>{selectedCourse=c;courseSearch.value=c;box.innerHTML="";};
  box.appendChild(d);
 });
}

// ===== 並び替え =====
function cycleSort(){
 sortMode=(sortMode+1)%4;
 const t=[
  "並び替え: 勝率 高い順",
  "並び替え: 勝率 低い順",
  "並び替え: 平均レート変動 大きい順",
  "並び替え: 平均レート変動 小さい順"
 ];
 sortBtn.textContent=t[sortMode];
 render();
}

// ===== メモ =====
function addMemo(){
 const t=memoTitle.value;
 const txt=memoText.value;
 const f=memoImage.files[0];
 if(!t)return alert("タイトル必須");

 const reader=new FileReader();
 reader.onload=()=>{
  memos.push({title:t,text:txt,img:reader.result});
  save();render();
 };
 if(f) reader.readAsDataURL(f);
 else{
  memos.push({title:t,text:txt});
  save();render();
 }

 memoTitle.value="";memoText.value="";memoImage.value="";
}

function editMemo(i){
 const t=prompt("タイトル",memos[i].title);
 if(t===null)return;
 const txt=prompt("本文",memos[i].text||"");
 if(txt===null)return;
 memos[i].title=t;
 memos[i].text=txt;
 save();render();
}

function deleteMemo(i){
 if(!confirm("削除?"))return;
 memos.splice(i,1);
 save();render();
}

function toggleMemo(i){
 const el=document.getElementById("memo"+i);
 el.style.display=el.style.display==="none"?"block":"none";
}

// ===== コース画像 =====
function uploadCourseImage(e,c){
 const f=e.target.files[0];
 if(!f)return;
 const reader=new FileReader();
 reader.onload=()=>{
  courseImages[c]=reader.result;
  save();render();
 };
 reader.readAsDataURL(f);
}

// ===== 描画 =====
function render(){

 // 直近
 recent.innerHTML="";
 data.slice(-5).reverse().forEach((r,idx)=>{
  const real=data.length-1-idx;
  const color=r.diff>0?"red":"blue";

  recent.innerHTML+=`
  <div>
   <span style="color:${color}">
    ${r.course} ${r.rank}位 [VR:${r.vr}] (${r.diff>=0?'+':''}${r.diff})
   </span>
   <button class="delete-btn" onclick="deleteRecord(${real})">削除</button>
  </div>`;
 });

 // 統計
 let maxVR=data.length?Math.max(...data.map(d=>d.vr)):0;
 let last30=data.slice(-30);
 let win=last30.filter(d=>d.diff>0).length;
 let wr=last30.length?(win/last30.length*100):0;
 let avgRank=data.length?(data.reduce((a,b)=>a+b.rank,0)/data.length):0;

 topStats.innerHTML=`
  <div>最高VR:${maxVR}</div>
  <div style="color:${wr>50?"red":"blue"}">勝率:${wr.toFixed(1)}%</div>
  <div>平均順位:${avgRank.toFixed(2)}位</div>
 `;

 // グラフ
 if(chart) chart.destroy();
 chart=new Chart(document.getElementById("chart"),{
  type:'line',
  data:{labels:data.map((_,i)=>i+1),datasets:[{data:data.map(d=>d.vr)}]}
 });

 // コース別
 let map={};
 data.forEach(d=>{
  if(!map[d.course]) map[d.course]={c:0,t:0,w:0,df:0};
  map[d.course].c++;
  map[d.course].t+=d.rank;
  map[d.course].df+=d.diff;
  if(d.diff>0) map[d.course].w++;
 });

 let list=courses.map(c=>{
  let s=map[c]||{c:0,t:0,w:0,df:0};
  let wr=s.c?(s.w/s.c*100):0;
  let avgDiff=s.c?(s.df/s.c):0;
  return {course:c,...s,wr,avgDiff};
 });

 list.sort((a,b)=>{
  switch(sortMode){
   case 0:return b.wr-a.wr;
   case 1:return a.wr-b.wr;
   case 2:return b.avgDiff-a.avgDiff;
   case 3:return a.avgDiff-b.avgDiff;
  }
 });

 let html="";
 list.forEach(i=>{
  html+=`
  <div class="card">
   <b>${i.course}</b><br>
   回数:${i.c}<br>
   平均順位:${i.c?(i.t/i.c).toFixed(2)+"位":"-"}<br>
   平均レート変動:<span style="color:${i.avgDiff>0?"red":"blue"}">${i.c?i.avgDiff.toFixed(1):"-"}</span><br>
   勝率:<span style="color:${i.wr>=50?"red":"blue"}">${i.c?i.wr.toFixed(1)+"%":"-"}</span><br>

   <input type="file" onchange="uploadCourseImage(event,'${i.course}')">
   ${courseImages[i.course]?`<img src="${courseImages[i.course]}" class="course-img" onclick="modalImg.src='${courseImages[i.course]}';imgModal.style.display='flex'">`:""}

   <button onclick="deleteCourse('${i.course}')">削除</button>
  </div>`;
 });
 courseStats.innerHTML=html;

 // メモ
 let mhtml="";
 const search=toKatakana(memoSearch.value.toLowerCase());

 memos.forEach((m,i)=>{
  if(search && !toKatakana(m.title.toLowerCase()).includes(search)) return;

  mhtml+=`
  <div class="card">
   <div class="memo-title" onclick="toggleMemo(${i})">${m.title}</div>
   <div id="memo${i}" class="memo-content">
    ${m.text||""}
    ${m.img?`<img src="${m.img}" class="memo-img" onclick="modalImg.src='${m.img}';imgModal.style.display='flex'">`:""}
    <button onclick="editMemo(${i})">編集</button>
    <button class="delete-btn" onclick="deleteMemo(${i})">削除</button>
   </div>
  </div>`;
 });
 memoList.innerHTML=mhtml;
}

render();
</script>

</body>
</html>
